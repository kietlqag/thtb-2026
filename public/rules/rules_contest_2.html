<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thể lệ Phần thi 2: Khát vọng</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 8px;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(180deg, #f7fbff 0%, #edf4ff 100%);
            color: #17325c;
        }
        .hero {
            background: linear-gradient(135deg, #0d5bdd 0%, #2f83ff 100%);
            color: #fff;
            border-radius: 16px;
            padding: 14px 16px;
            margin-bottom: 8px;
            box-shadow: 0 8px 20px rgba(17, 65, 146, 0.12);
        }
        .eyebrow {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(255,255,255,0.16);
            font-size: 11px;
            font-weight: 800;
            margin-bottom: 6px;
        }
        h1, p { margin: 0; }
        h1 { font-size: 22px; margin-bottom: 4px; }
        p { font-size: 13px; color: rgba(255,255,255,0.92); }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .card {
            background: #fff;
            border: 1px solid #d7e4ff;
            border-radius: 14px;
            padding: 12px;
            box-shadow: 0 8px 20px rgba(17, 65, 146, 0.08);
            min-height: 110px;
        }
        .icon {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-bottom: 8px;
            background: #eaf2ff;
            color: #0d5bdd;
        }
        .title {
            font-size: 22px;
            font-weight: 800;
            color: #0d5bdd;
            margin-bottom: 4px;
        }
        .desc {
            font-size: 14px;
            line-height: 1.3;
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="eyebrow">THỂ LỆ CHÍNH THỨC</div>
        <h1>Phần thi 2: Khát vọng</h1>
        <p>Keyword chính của phần thi</p>
    </section>

    <section class="grid">
        <div class="card"><div class="icon">🕔</div><div class="title">5 phút</div><div class="desc">Thời gian trình bày của mỗi đội</div></div>
        <div class="card"><div class="icon">🌐</div><div class="title">40%</div><div class="desc">Điểm trực tuyến</div></div>
        <div class="card"><div class="icon">🎙</div><div class="title">60%</div><div class="desc">Điểm thuyết minh</div></div>
        <div class="card"><div class="icon">📋</div><div class="title">Theo thứ tự</div><div class="desc">Thi theo danh sách đã công bố</div></div>
        <div class="card"><div class="icon">👨‍⚖️</div><div class="title">Chấm trực tiếp</div><div class="desc">Ban Giám khảo chấm sau phần trình bày</div></div>
        <div class="card"><div class="icon">💯</div><div class="title">100 điểm</div><div class="desc">Tổng = 40% + 60%</div></div>
    </section>
</body>
</html>
